name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build applications
        run: |
          mkdir deploy_root
          cp index.html deploy_root/
          
          cd frontend-worker
          npm ci
          npm run build
          cd ..
          cp -r frontend-worker/dist deploy_root/worker
          
          cd frontend-admin
          npm ci
          npm run build
          cd ..
          cp -r frontend-admin/dist deploy_root/admin
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'deploy_root'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
