services:
  - type: web
    name: parametric-guard-backend
    env: python
    rootDir: backend-python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: TZ
        value: Asia/Kolkata
